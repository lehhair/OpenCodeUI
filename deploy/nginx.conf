# OpenCodeUI - Nginx 静态部署配置
# 来源: deploy/nginx.conf (项目目录)
# 符号链接: /www/server/panel/vhost/nginx/opencodeui.conf
# 回滚: rm /www/server/panel/vhost/nginx/opencodeui.conf && nginx -s reload && docker start opencodeui

server {
    listen 3100;
    server_name _;

    # 鉴权验证端点（Lua 实现，因为宝塔 nginx 未编译 auth_basic 模块）
    location = /auth/verify {
        access_by_lua_block {
            local auth_header = ngx.req.get_headers()["Authorization"]
            if not auth_header then
                ngx.header["WWW-Authenticate"] = 'Basic realm="OpenCode"'
                ngx.status = 401
                ngx.say("Unauthorized")
                ngx.exit(401)
                return
            end

            local _, _, b64 = string.find(auth_header, "^Basic%s+(.+)$")
            if not b64 then
                ngx.header["WWW-Authenticate"] = 'Basic realm="OpenCode"'
                ngx.status = 401
                ngx.say("Unauthorized")
                ngx.exit(401)
                return
            end

            local decoded = ngx.decode_base64(b64)
            if not decoded then
                ngx.header["WWW-Authenticate"] = 'Basic realm="OpenCode"'
                ngx.status = 401
                ngx.say("Unauthorized")
                ngx.exit(401)
                return
            end

            -- 读取凭据文件，格式: user:md5(user:salt:password)
            local f = io.open("/www/Opensourcepro/OpenCodeUI/deploy/.htpasswd", "r")
            if not f then
                ngx.log(ngx.ERR, "cannot open htpasswd file")
                ngx.status = 500
                ngx.say("Internal Server Error")
                ngx.exit(500)
                return
            end

            local creds = {}
            for line in f:lines() do
                local user, hash = line:match("^([^:]+):(.+)$")
                if user and hash then
                    creds[user] = hash
                end
            end
            f:close()

            local user, pass = decoded:match("^([^:]+):(.+)$")
            if not user or not pass then
                ngx.header["WWW-Authenticate"] = 'Basic realm="OpenCode"'
                ngx.status = 401
                ngx.say("Unauthorized")
                ngx.exit(401)
                return
            end

            local expected = creds[user]
            if not expected then
                ngx.header["WWW-Authenticate"] = 'Basic realm="OpenCode"'
                ngx.status = 401
                ngx.say("Unauthorized")
                ngx.exit(401)
                return
            end

            local SALT = "opencodeui_2026"
            local computed = ngx.md5(user .. ":" .. SALT .. ":" .. pass)
            if computed ~= expected then
                ngx.header["WWW-Authenticate"] = 'Basic realm="OpenCode"'
                ngx.status = 401
                ngx.say("Unauthorized")
                ngx.exit(401)
                return
            end
        }
        content_by_lua_block {
            ngx.say("ok")
        }
    }

    # 客户端鉴权脚本
    location = /auth-guard.js {
        alias /www/Opensourcepro/OpenCodeUI/deploy/auth-guard.js;
        add_header Cache-Control "no-store";
    }

    # API 反向代理（SSE 流式）
    location /api/ {
        proxy_pass http://127.0.0.1:4096/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Connection '';
        proxy_buffering off;
        proxy_cache off;
        proxy_no_cache 1;
        proxy_cache_bypass 1;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
        chunked_transfer_encoding off;
    }

    # WebSocket 终端代理
    location /api/pty/ {
        proxy_pass http://127.0.0.1:4096/pty/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 86400s;
        proxy_cache off;
        proxy_no_cache 1;
        proxy_cache_bypass 1;
    }

    # 静态文件服务 + SPA 回退
    location / {
        root /www/Opensourcepro/OpenCodeUI/dist;
        try_files $uri $uri/ /index.html;
        index index.html;

        # JS/CSS 长缓存（Vite 已含 hash）
        location ~* \.(js|css)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }

        # 其他静态资源
        location ~* \.(png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 30d;
            add_header Cache-Control "public";
        }

        # HTML 不缓存
        location ~* \.html$ {
            add_header Cache-Control "no-cache, no-store, must-revalidate";
        }
    }
}
