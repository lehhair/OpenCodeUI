# OpenCodeUI - Nginx 静态部署配置
# 来源: deploy/nginx.conf (项目目录)
# 符号链接: /www/server/panel/vhost/nginx/opencodeui.conf
# 回滚: rm /www/server/panel/vhost/nginx/opencodeui.conf && nginx -s reload && docker start opencodeui

# Shared dict for cross-worker SSE notification
lua_shared_dict sync_version 1m;

server {
    listen 3100;
    server_name _;
    # 鉴权验证端点（使用共享 auth.lua 模块）
    location = /auth/verify {
        access_by_lua_block {
            if not package.path:find("/www/Opensourcepro/OpenCodeUI/deploy/lua") then
                package.path = package.path .. ";/www/Opensourcepro/OpenCodeUI/deploy/lua/?.lua"
            end
            local auth = require("auth")
            auth.verify()
        }
        content_by_lua_block {
            ngx.say("ok")
        }
    }

    # 客户端鉴权脚本
    location = /auth-guard.js {
        alias /www/Opensourcepro/OpenCodeUI/deploy/auth-guard.js;
        add_header Cache-Control "no-store";
    }

    # 目录持久化 API（Lua 实现）
    location = /api/directories {
        access_by_lua_block {
            if not package.path:find("/www/Opensourcepro/OpenCodeUI/deploy/lua") then
                package.path = package.path .. ";/www/Opensourcepro/OpenCodeUI/deploy/lua/?.lua"
            end
            local auth = require("auth")
            auth.verify()
        }
        content_by_lua_block {
            local method = ngx.var.request_method
            local DATA_DIR = "/www/Opensourcepro/OpenCodeUI/deploy/data"
            local DATA_FILE = DATA_DIR .. "/saved-directories.json"
            local EMPTY_JSON = '{"savedDirectories":[],"recentProjects":{}}'

            if method == "GET" then
                local f = io.open(DATA_FILE, "r")
                if f then
                    local content = f:read("*a")
                    f:close()
                    if content and content ~= "" then
                        ngx.header["Content-Type"] = "application/json"
                        ngx.header["Cache-Control"] = "no-store"
                        ngx.say(content)
                        return
                    end
                end
                ngx.header["Content-Type"] = "application/json"
                ngx.header["Cache-Control"] = "no-store"
                ngx.say(EMPTY_JSON)
                return
            end

            if method == "POST" then
                ngx.req.read_body()
                local body = ngx.req.get_body_data()

                if not body or body == "" then
                    ngx.status = 400
                    ngx.header["Content-Type"] = "application/json"
                    ngx.say('{"error":"request body is empty"}')
                    return
                end

                if #body > 262144 then
                    ngx.status = 413
                    ngx.header["Content-Type"] = "application/json"
                    ngx.say('{"error":"request body too large (max 256KB)"}')
                    return
                end

                if body:sub(1, 1) ~= "{" or body:sub(-1) ~= "}" then
                    ngx.status = 400
                    ngx.header["Content-Type"] = "application/json"
                    ngx.say('{"error":"invalid JSON: must be an object"}')
                    return
                end

                if not body:find('"savedDirectories"') then
                    ngx.status = 400
                    ngx.header["Content-Type"] = "application/json"
                    ngx.say('{"error":"invalid JSON: missing savedDirectories field"}')
                    return
                end

                if not body:find('"recentProjects"') then
                    ngx.status = 400
                    ngx.header["Content-Type"] = "application/json"
                    ngx.say('{"error":"invalid JSON: missing recentProjects field"}')
                    return
                end

                -- Atomic write: temp file then rename
                local pid = ngx.worker.pid()
                local tmp_file = DATA_FILE .. ".tmp." .. pid
                local ok, err
                local tf, err = io.open(tmp_file, "w")
                if not tf then
                    ngx.status = 500
                    ngx.header["Content-Type"] = "application/json"
                    ngx.say('{"error":"cannot write temp file: ' .. (err or "unknown") .. '"}')
                    return
                end
                tf:write(body)
                tf:close()

                ok, err = os.rename(tmp_file, DATA_FILE)
                if not ok then
                    ngx.status = 500
                    ngx.header["Content-Type"] = "application/json"
                    ngx.say('{"error":"cannot rename temp file: ' .. (err or "unknown") .. '"}')
                    return
                end

                ngx.header["Content-Type"] = "application/json"
                ngx.say('{"ok":true}')
                return
            end

            -- Unsupported method
            ngx.status = 405
            ngx.header["Content-Type"] = "application/json"
            ngx.say('{"error":"method not allowed"}')
        }
    }

    # Sync API — differential sync with version tracking
    location = /api/sync {
        access_by_lua_block {
            if not package.path:find("/www/Opensourcepro/OpenCodeUI/deploy/lua") then
                package.path = package.path .. ";/www/Opensourcepro/OpenCodeUI/deploy/lua/?.lua"
            end
            local auth = require("auth")
            auth.verify()
        }
        content_by_lua_block {
            if not package.path:find("/www/Opensourcepro/OpenCodeUI/deploy/lua") then
                package.path = package.path .. ";/www/Opensourcepro/OpenCodeUI/deploy/lua/?.lua"
            end
            local sync_api = require("sync_api")
            sync_api.handle()
        }
    }

    # SSE endpoint — push notifications for setting changes
    location = /api/sync/sse {
        access_by_lua_block {
            if not package.path:find("/www/Opensourcepro/OpenCodeUI/deploy/lua") then
                package.path = package.path .. ";/www/Opensourcepro/OpenCodeUI/deploy/lua/?.lua"
            end
            local auth = require("auth")
            auth.verify()
        }
        content_by_lua_block {
            if not package.path:find("/www/Opensourcepro/OpenCodeUI/deploy/lua") then
                package.path = package.path .. ";/www/Opensourcepro/OpenCodeUI/deploy/lua/?.lua"
            end
            local sync_sse = require("sync_sse")
            sync_sse.handle()
        }
    }

    # API 反向代理（SSE 流式）
    location /api/ {
        proxy_pass http://127.0.0.1:4096/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Connection '';
        proxy_buffering off;
        proxy_cache off;
        proxy_no_cache 1;
        proxy_cache_bypass 1;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
        chunked_transfer_encoding off;
    }

    # WebSocket 终端代理
    location /api/pty/ {
        proxy_pass http://127.0.0.1:4096/pty/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 86400s;
        proxy_cache off;
        proxy_no_cache 1;
        proxy_cache_bypass 1;
    }

    # 静态文件服务 + SPA 回退
    location / {
        root /www/Opensourcepro/OpenCodeUI/dist;
        try_files $uri $uri/ /index.html;
        index index.html;

        # JS/CSS 长缓存（Vite 已含 hash）
        location ~* \.(js|css)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }

        # 其他静态资源
        location ~* \.(png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 30d;
            add_header Cache-Control "public";
        }

        # HTML 不缓存
        location ~* \.html$ {
            add_header Cache-Control "no-cache, no-store, must-revalidate";
        }
    }
}
